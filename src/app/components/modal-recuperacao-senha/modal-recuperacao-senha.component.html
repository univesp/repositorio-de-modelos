<div class="modal-overlay" (click)="fechar()">
  <div class="modal-conteudo" (click)="$event.stopPropagation()">
    <div class="modal-cabecalho">
      <h2 class="modal-titulo">Recuperação de Senha</h2>
      <button type="button" class="botao-fechar" (click)="fechar()">
        &times;
      </button>
    </div>

    <div class="modal-corpo">
      <p class="texto-instrucao">
        Digite o email cadastrado para receber um link de recuperação de senha.
      </p>

      <form [formGroup]="formularioReset" (ngSubmit)="enviar()">
        <div class="grupo-formulario">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            class="controle-formulario"
            placeholder="seu@email.com"
            [class.invalido]="formularioReset.get('email')?.invalid && formularioReset.get('email')?.touched"
          >
          <div class="feedback-invalido" *ngIf="formularioReset.get('email')?.errors?.['required']">
            Email é obrigatório
          </div>
          <div class="feedback-invalido" *ngIf="formularioReset.get('email')?.errors?.['email']">
            Digite um email válido
          </div>
        </div>

        <div class="modal-rodape">
          <button
            type="button"
            class="botao botao-secundario"
            (click)="fechar()"
            [disabled]="carregando"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="botao botao-primario"
            [disabled]="formularioReset.invalid || carregando"
          >
            <span *ngIf="!carregando">Enviar</span>
            <span *ngIf="carregando">
              <i class="spinner-border spinner-border-sm me-2"></i>
              Enviando...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
